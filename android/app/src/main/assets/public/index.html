    <!-- Pure JS System Diagnostics Initializer -->
    <script>
      (function() {
        window.__diagnosticLogs = [];
        window.__addDiagnosticLog = function(type, msg, meta) {
          var entry = {
            time: new Date().toLocaleTimeString(),
            type: type,
            message: msg || '',
            meta: meta || null
          };
          window.__diagnosticLogs.push(entry);
          
          // Propagate to actual log list if defined
          var listEl = document.getElementById('dm-diag-list');
          if (listEl) {
            var logDiv = document.createElement('div');
            logDiv.style.borderLeft = '3px solid ' + (type === 'error' ? '#ef4444' : type === 'warn' ? '#f59e0b' : '#10b981');
            logDiv.style.paddingLeft = '8px';
            logDiv.style.marginBottom = '2px';
            logDiv.style.color = type === 'error' ? '#fca5a5' : type === 'warn' ? '#fde047' : '#cbd5e1';
            
            var metaString = '';
            if (meta) {
              try { metaString = '\n' + JSON.stringify(meta, null, 2); } catch(e) {}
            }
            
            logDiv.innerHTML = '<span style="color:#64748b;font-weight:600;">[' + entry.time + ']</span> <span style="font-weight:bold;text-transform:uppercase;">[' + type + ']</span> ' + 
                               entry.message.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") + 
                               (metaString ? '<pre style="margin: 4px 0 0 0; background:rgba(0,0,0,0.3); padding:4px; border-radius:4px; font-size:10px; color:#94a3b8; overflow-x:auto;">' + metaString + '</pre>' : '');
            
            listEl.appendChild(logDiv);
            listEl.scrollTop = listEl.scrollHeight;
          }
        };

        // Capture unhandled errors before React starts
        window.onerror = function(message, source, lineno, colno, error) {
          window.__addDiagnosticLog('error', 'Uncaught Script Error: ' + message, {
            source: source,
            line: lineno,
            column: colno,
            stack: error ? error.stack : 'N/A'
          });
          // Pulse the Diags button red to hint at fatal failure
          var triggerEl = document.getElementById('dm-diag-trigger');
          if (triggerEl) {
            triggerEl.style.background = 'rgba(239, 68, 68, 0.4)';
            triggerEl.style.borderColor = 'rgba(239, 68, 68, 1)';
            triggerEl.style.color = '#ef4444';
            triggerEl.innerHTML = '⚡ Errors Detected';
          }
        };

        window.onunhandledrejection = function(event) {
          window.__addDiagnosticLog('error', 'Unhandled Rejection: ' + (event.reason ? event.reason.message || event.reason : 'Unknown rejection'), {
            reason: event.reason ? (event.reason.stack || event.reason) : 'N/A'
          });
          var triggerEl = document.getElementById('dm-diag-trigger');
          if (triggerEl) {
            triggerEl.style.background = 'rgba(239, 68, 68, 0.4)';
            triggerEl.style.borderColor = 'rgba(239, 68, 68, 1)';
            triggerEl.style.color = '#ef4444';
            triggerEl.innerHTML = '⚡ Errors Detected';
          }
        };

        // Capture console outputs elegantly
        var originalConsoleError = console.error;
        console.error = function() {
          var args = Array.prototype.slice.call(arguments);
          var msg = args.map(function(arg) {
            if (arg instanceof Error) return arg.message + '\n' + arg.stack;
            if (typeof arg === 'object') { try { return JSON.stringify(arg); } catch(e) { return String(arg); } }
            return String(arg);
          }).join(' ');
          window.__addDiagnosticLog('error', msg);
          originalConsoleError.apply(console, arguments);
        };

        var originalConsoleWarn = console.warn;
        console.warn = function() {
          var args = Array.prototype.slice.call(arguments);
          var msg = args.map(function(arg) {
            if (typeof arg === 'object') { try { return JSON.stringify(arg); } catch(e) { return String(arg); } }
            return String(arg);
          }).join(' ');
          window.__addDiagnosticLog('warn', msg);
          originalConsoleWarn.apply(console, arguments);
        };

        window.__addDiagnosticLog('info', 'System diagnostics initialized', {
          userAgent: navigator.userAgent,
          href: window.location.href,
          origin: window.location.origin,
          protocol: window.location.protocol
        });
      })();
    </script>

      <div style="flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; margin-bottom: 16px;">

      <!-- Action Utilities -->

        <button onclick="window.__clearDiagCache()" style="background: #ef4444; color: white; border: none; padding: 10px 16px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; flex-grow: 1; min-width: 150px; transition: opacity 0.15s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">🧹 Clear Local Cache & Reset</button>
        <button onclick="window.__promptApiOverride()" style="background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; flex-grow: 1; min-width: 150px; transition: opacity 0.15s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">🌐 Override Remote Server URL</button>
        <button onclick="window.location.reload(true)" style="background: #10b981; color: white; border: none; padding: 10px 16px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; flex-grow: 1; min-width: 150px; transition: opacity 0.15s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">🔄 Reload App</button>
        <button onclick="window.__dumpLogsAlert()" style="background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.15); padding: 10px 16px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; flex-grow: 1; min-width: 150px; transition: opacity 0.15s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">📤 Copy/Alert Full Logs</button>
      </div>

      <!-- Real-time Diagnostics Logs Output Container -->
      <div style="flex-grow: 1; min-height: 250px; background: #020617; border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 16px; display: flex; flex-direction: column;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 8px; margin-bottom: 12px;">
          <span style="font-size: 11px; font-weight: 800; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.05em;">Console & Error Streams</span>
          <button onclick="window.__clearDiagConsole()" style="background: transparent; border: none; color: #64748b; font-size: 11px; cursor: pointer; text-decoration: underline;">Clear Display</button>
        </div>
        <div id="dm-diag-list" style="flex-grow: 1; overflow-y: auto; font-family: 'Courier New', Courier, monospace; font-size: 11px; line-height: 1.6; display: flex; flex-direction: column; gap: 6px; max-height: 400px;">
          <!-- Active log statements will sit here -->
        </div>

    <script>
      (function() {
        var panel = document.getElementById('dm-diag-panel');
        var isShown = false;

        window.__toggleDiagnosticPanel = function() {
          isShown = !isShown;
          if (isShown) {
            panel.style.display = 'flex';
            // Trigger reflow
            panel.offsetHeight;
            panel.style.opacity = '1';
            
            // Populate stats
            document.getElementById('dm-diag-env').innerText = (window.Capacitor || (window.location.protocol === 'file:') || (window.location.protocol === 'capacitor:')) ? '📦 Capacitor Native' : '🌐 Standard Browser';
            document.getElementById('dm-diag-api-override').innerText = localStorage.getItem('swiftcart_api_base_override') || 'Default Fallback';
            document.getElementById('dm-diag-protocol').innerText = window.location.protocol + ' // ' + window.location.hostname;
          } else {
            panel.style.opacity = '0';
            setTimeout(function() {
              if (!isShown) panel.style.display = 'none';
            }, 250);
          }
        };

        window.__clearDiagConsole = function() {
          var listEl = document.getElementById('dm-diag-list');
          if (listEl) listEl.innerHTML = '<div style="color: #64748b; font-style: italic;">Console log display cleared.</div>';
        };

        window.__clearDiagCache = function() {
          if (confirm('Are you sure you want to clear your local session cache, tokens, and active overrides? This resets Daily Mart completely.')) {
            localStorage.clear();
            sessionStorage.clear();
            alert('Cache cleared! Reloading...');
            window.location.reload(true);
          }
        };

        window.__promptApiOverride = function() {
          var current = localStorage.getItem('swiftcart_api_base_override') || 'https://ais-pre-u4qsdpfkg63jdkgnj3beph-260720568939.asia-southeast1.run.app';
          var input = prompt('Please specify the absolute URL of the Daily Mart Node server/API sandbox base directory:', current);
          if (input !== null) {
            var trimmed = input.trim();
            if (trimmed) {
              localStorage.setItem('swiftcart_api_base_override', trimmed);
              alert('Base address override applied successfully: ' + trimmed + '\nReloading to synchronize routing.');
            } else {
              localStorage.removeItem('swiftcart_api_base_override');
              alert('Override removed. Reverting back to default routing fallback.');
            }
            window.location.reload(true);
          }
        };

        window.__dumpLogsAlert = function() {
          var text = window.__diagnosticLogs.map(function(l) {
            return '[' + l.time + '] [' + l.type.toUpperCase() + '] ' + l.message + (l.meta ? '\n' + JSON.stringify(l.meta) : '');
          }).join('\n');
          
          try {
            navigator.clipboard.writeText(text);
            alert('Full logs copied to clipboard successfully! You can paste them in chats or forums.');
          } catch(e) {
            alert('Unable to copy directly. Alerting first 1600 characters:\n\n' + text.substring(0, 1600));
          }
        };

        // Populate any pre-existing logs stored before render
        setTimeout(function() {
          if (window.__diagnosticLogs) {
            for (var i = 0; i < window.__diagnosticLogs.length; i++) {
              var l = window.__diagnosticLogs[i];
              // Feed to list
              var listEl = document.getElementById('dm-diag-list');
              if (listEl) {
                var logDiv = document.createElement('div');
                logDiv.style.borderLeft = '3px solid ' + (l.type === 'error' ? '#ef4444' : l.type === 'warn' ? '#f59e0b' : '#10b981');
                logDiv.style.paddingLeft = '8px';
                logDiv.style.marginBottom = '2px';
                logDiv.style.color = l.type === 'error' ? '#fca5a5' : l.type === 'warn' ? '#fde047' : '#cbd5e1';
                logDiv.innerHTML = '<span style="color:#64748b;font-weight:600;">[' + l.time + ']</span> <span style="font-weight:bold;text-transform:uppercase;">[' + l.type + ']</span> ' + l.message.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                listEl.appendChild(logDiv);
              }
            }
          }
        }, 100);

        // Hydro/Initialization Watchdog
        setTimeout(function() {
          if (!window.__REACT_INIT_SUCCESS__) {
            window.__addDiagnosticLog('warn', '⏳ Checkpoint: React hydration watchdog triggered. The root shell has not declared success. If you see a white screen, tap here or check the logs above to see which assets failed to parse.');
          }
        }, 6000);
      })();
    </script>
